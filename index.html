<html lang="en">

<meta charset="UTF-8"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a09;display:flex;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{width:100%;max-width:390px;background:#111110;min-height:100vh;display:flex;flex-direction:column;}
.scr{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.scr.on{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.sb{display:flex;justify-content:space-between;padding:14px 20px 4px;font-size:11px;font-weight:500;color:#F1EFE8;flex-shrink:0;}
.tb{display:flex;align-items:center;padding:8px 16px 10px;border-bottom:.5px solid #333331;flex-shrink:0;}
.tb .bk{font-size:13px;color:#888780;cursor:pointer;min-width:50px;}
.tb .tt{font-size:17px;font-weight:500;color:#F1EFE8;flex:1;text-align:center;}
.tb .rt{min-width:50px;text-align:right;font-size:13px;cursor:pointer;}
.nav{display:flex;justify-content:space-around;padding:10px 0 18px;background:#1C1C1A;border-top:.5px solid #333331;flex-shrink:0;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.ni span{font-size:10px;color:#888780;}
.ni.on span{color:#97C459;}
.sh{padding:10px 16px 6px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#888780;}
.btn{border-radius:12px;padding:13px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;display:block;border:none;width:100%;}
.bg{background:#27500A;color:#C0DD97;}
.bb{background:#042C53;color:#85B7EB;}
.br{background:#501313;color:#F09595;}
.ba{background:#412402;color:#FAC775;}
.bx{background:#252523;color:#F1EFE8;border:.5px solid #333331 !important;}
.tabs{display:flex;padding:0 16px;border-bottom:.5px solid #333331;flex-shrink:0;}
.tab{flex:1;text-align:center;padding:8px 0;font-size:12px;font-weight:500;color:#888780;cursor:pointer;border-bottom:2px solid transparent;}
.tab.on{color:#97C459;border-color:#97C459;}
.inp{width:100%;border-radius:10px;padding:11px 14px;font-size:13px;background:#1C1C1A;border:.5px solid #333331;color:#F1EFE8;font-family:inherit;outline:none;}
.inp:focus{border-color:#639922;}
.pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block;}
.card{background:#1C1C1A;border-radius:12px;padding:12px 14px;margin:0 16px 8px;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
.sheet{background:#1C1C1A;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:390px;max-height:80vh;overflow-y:auto;}
.chart-bar{display:flex;align-items:flex-end;gap:4px;height:80px;}
.bar{flex:1;border-radius:4px 4px 0 0;background:#27500A;min-width:8px;transition:height .3s;}

// ── COMPUTED STATS FROM ROUNDS ─────────────────────────────────────
function computeStats(){
  const rounds=state.rounds;
  if(!rounds.length) return {fairways:null,gir:null,putts:null,avgScore:null,hdcpTrend:null};
  const last5=rounds.slice(-5);
  let fw=0,fwTotal=0,girCount=0,girTotal=0,puttCount=0,scoreTotal=0;
  last5.forEach(r=>{
    if(r.summary){
      fw+=r.summary.fairways||0; fwTotal+=r.summary.fwTotal||9;
      girCount+=r.summary.gir||0; girTotal+=9;
      puttCount+=r.summary.putts||0;
      scoreTotal+=r.summary.score||0;
    }
  });
  const fwPct=fwTotal>0?Math.round(fw/fwTotal*100):null;
  const girPct=girTotal>0?Math.round(girCount/girTotal*100):null;
  const avgPutts=last5.length>0?+(puttCount/last5.length).toFixed(1):null;
  const avgScore=last5.length>0?Math.round(scoreTotal/last5.length):null;
  // compare to prior 5
  const prior=rounds.slice(-10,-5);
  let priorFw=0,priorFwT=0,priorGir=0,priorGirT=0,priorPutts=0;
  prior.forEach(r=>{if(r.summary){priorFw+=r.summary.fairways||0;priorFwT+=r.summary.fwTotal||9;priorGir+=r.summary.gir||0;priorGirT+=9;priorPutts+=r.summary.putts||0;}});
  const priorFwPct=priorFwT>0?Math.round(priorFw/priorFwT*100):null;
  const priorGirPct=priorGirT>0?Math.round(priorGir/priorGirT*100):null;
  const priorAvgPutts=prior.length>0?+(priorPutts/prior.length).toFixed(1):null;
  return {
    fairways:fwPct, fairwaysDelta:priorFwPct!==null&&fwPct!==null?fwPct-priorFwPct:null,
    gir:girPct, girDelta:priorGirPct!==null&&girPct!==null?girPct-priorGirPct:null,
    avgPutts, puttsDelta:priorAvgPutts!==null&&avgPutts!==null?+(avgPutts-priorAvgPutts).toFixed(1):null,
    avgScore, hdcpTrend:state.hdcpHistory.length>1?(+(state.hdcpHistory[state.hdcpHistory.length-1]-state.hdcpHistory[0]).toFixed(1)):0
  };
}

function buildCaddieMemory(){
  // rebuild from all rounds
  const mem={};
  state.rounds.forEach(r=>{
    if(!r.holes) return;
    r.holes.forEach((h,i)=>{
      if(!h||!h.club) return;
      if(!mem[i]) mem[i]=[];
      mem[i].push({club:h.club,result:h.result,score:h.score,date:r.date});
    });
  });
  state.caddieMem=mem;
}

function getCaddieAdvice(holeIdx){
  const mem=state.caddieMem[holeIdx];
  if(!mem||mem.length<2) return null;
  // group by club
  const byClub={};
  mem.forEach(m=>{
    if(!byClub[m.club]) byClub[m.club]={good:0,bad:0,total:0};
    byClub[m.club].total++;
    if(m.result==='good'||m.result==='okay') byClub[m.club].good++;
    else byClub[m.club].bad++;
  });
  // find best and worst club
  let best=null,worst=null,bestRate=0,worstRate=1;
  Object.entries(byClub).forEach(([club,d])=>{
    if(d.total<1) return;
    const rate=d.good/d.total;
    if(rate>bestRate&&d.total>=1){bestRate=rate;best=club;}
    if(rate<worstRate&&d.total>=1){worstRate=rate;worst=club;}
  });
  if(best&&worst&&best!==worst) return `"${worst} has been trouble here (${Math.round(worstRate*100)}% bad). ${best} has worked better — ${Math.round(bestRate*100)}% success rate."`;
  if(best) return `"${best} has been your best play here — ${Math.round(bestRate*100)}% success over ${byClub[best].total} rounds."`;
  return null;
}

// ── SKINS LIVE SCORING ───────────────────────────────────────────────
function openSkinsScoring(ci){
  state.activeSkins=ci;
  go('skins-live');
}

function renderSkinsLive(){
  const ci=state.activeSkins;
  const ch=state.challenges[ci];
  if(!ch||ch.type!=='skins') return renderChallenges();
  const sd=ch.skinsData;
  if(!sd.scores) sd.scores={};
  if(!sd.skins) sd.skins={};

  // compute skins
  const computedSkins={};
  sd.players.forEach(p=>computedSkins[p]=0);
  let carry=0;
  for(let h=0;h<sd.holes;h++){
    const hScores=sd.scores[h]||{};
    const vals=sd.players.map(p=>({p,s:hScores[p]!==undefined?hScores[p]:null})).filter(x=>x.s!==null);
    if(vals.length<sd.players.length){carry++;continue;}
    const min=Math.min(...vals.map(x=>x.s));
    const winners=vals.filter(x=>x.s===min);
    if(winners.length===1){computedSkins[winners[0].p]+=(sd.carry?carry+1:1);carry=0;}
    else if(sd.carry){carry++;}
    else{carry=0;}
  }

  let holeRows='';
  for(let h=0;h<Math.min(sd.holes,9);h++){
    const hScores=sd.scores[h]||{};
    const vals=sd.players.map(p=>({p,s:hScores[p]!==undefined?hScores[p]:null}));
    const allFilled=vals.every(x=>x.s!==null);
    let winner='';
    if(allFilled){
      const min=Math.min(...vals.map(x=>x.s));
      const wins=vals.filter(x=>x.s===min);
      winner=wins.length===1?wins[0].p:'Carry';
    }
    holeRows+=`<div style="border-bottom:.5px solid ${G.s2};padding:10px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:13px;font-weight:500;color:${G.t};">Hole ${h+1}</div>
        ${winner?`<span class="pill" style="background:${winner==='Carry'?G.aB:G.gB};color:${winner==='Carry'?G.aT:G.gT};">${winner==='Carry'?'Carried →':winner+' wins'}</span>`:'<span style="font-size:11px;color:'+G.m+';">Pending</span>'}
      </div>
      <div style="display:flex;gap:8px;">
        ${sd.players.map(p=>`<div style="flex:1;text-align:center;">
          <div style="font-size:10px;color:${G.m};margin-bottom:4px;">${p.split(' ')[0]}</div>
          <input oninput="updateSkinsScore(${ci},${h},'${p}',this.value)" value="${hScores[p]!==undefined?hScores[p]:''}" placeholder="-" style="width:100%;border-radius:8px;padding:6px 4px;font-size:14px;font-weight:500;background:${G.s2};border:.5px solid ${G.b};color:${G.t};text-align:center;outline:none;font-family:inherit;"/>
        </div>`).join('')}
      </div>
    </div>`;
  }

  return `<div class="scr on">
    ${sb()}${topbar('Skins — Live','back()')}
    <div class="scroll">
      <div style="margin:10px 16px;border-radius:10px;padding:10px 14px;background:${G.aB};display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;font-weight:500;color:${G.aT};">${ch.title.replace('Skins — ','')}</span>
        <span style="font-size:11px;color:${G.aD};">${sd.carry?'Carry on ties':'No carry'}</span>
      </div>
      <div class="sh">Standings</div>
      <div style="margin:0 16px 10px;border-radius:10px;overflow:hidden;border:.5px solid ${G.b};">
        ${sd.players.map((p,i)=>`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:${i<sd.players.length-1?`.5px solid ${G.s2}`:'none'};background:${computedSkins[p]===Math.max(...Object.values(computedSkins))?G.gB:G.s};">
          ${av(p,i,28)}<div style="flex:1;margin-left:8px;font-size:13px;font-weight:500;color:${computedSkins[p]===Math.max(...Object.values(computedSkins))?G.gT:G.t};">${p}</div>
          <div style="font-size:18px;font-weight:500;color:${computedSkins[p]===Math.max(...Object.values(computedSkins))?G.g:G.m};">${computedSkins[p]} 💀</div>
        </div>`).join('')}
      </div>
      <div class="sh">Enter scores by hole</div>
      ${holeRows}
      <div style="height:16px;"></div>
    </div>
    ${navHtml('challenges')}
  </div>`;
}
function updateSkinsScore(ci,hole,player,val){
  const n=parseInt(val);
  if(!state.challenges[ci].skinsData.scores) state.challenges[ci].skinsData.scores={};
  if(!state.challenges[ci].skinsData.scores[hole]) state.challenges[ci].skinsData.scores[hole]={};
  if(!isNaN(n)) state.challenges[ci].skinsData.scores[hole][player]=n;
  else delete state.challenges[ci].skinsData.scores[hole][player];
  saveState();
  // partial re-render of standings only
  const app=document.getElementById('app');
  if(app) setTimeout(()=>{if(state.screen==='skins-live') render();},300);
}

  state.currentRound={id:Date.now(),date:new Date().toLocaleDateString(),course:"Cog Hill",holes:Array(9).fill(null)};

function renderRound(){
  if(!state.currentRound) return `<div class="scr on">${sb()}<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;"><div style="font-size:14px;color:${G.m};text-align:center;">No round in progress.</div><div onclick="startRound()" class="btn bg">Start a round</div></div>${navHtml('round')}</div>`;
  const h=HOLES_DEF[state.currentHole];
  const log=state.holeLog[state.currentHole]||{};

function selectClub(club){
  if(!state.holeLog[state.currentHole]) state.holeLog[state.currentHole]={};
  state.holeLog[state.currentHole].club=club;
  saveState();render();
}
function logHole(result){
  if(!state.holeLog[state.currentHole]) state.holeLog[state.currentHole]={};
  state.holeLog[state.currentHole].result=result;
  state.currentHole=Math.min(8,state.currentHole+1);
  saveState();render();
}
function finishRound(){
  // Build round summary
  const log=state.holeLog;
  let fw=0,gir=0,putts=0,goods=0;
  let fwTotal=0,girTotal=0;
  Object.values(log).forEach(h=>{
    if(h.result==='good'){goods++;fw++;gir++;}
    if(h.result==='okay'){fw++;gir++;}
    fwTotal++;girTotal++;
    if(h.result==='disaster') putts++;
  });
  const score=36+Object.values(log).reduce((s,h)=>s+(h.result==='good'?0:h.result==='okay'?1:2),0);
  state.currentRound.holes=Object.entries(log).map(([i,h])=>({...h,holeIdx:parseInt(i)}));
  state.currentRound.summary={fairways:fw,fwTotal,gir,girTotal,putts,score};
  state.rounds.push({...state.currentRound});
  // update hdcp slightly
  if(goods>4) state.hdcpHistory.push(+(state.user.hdcp-0.1).toFixed(1));
  else state.hdcpHistory.push(+(state.user.hdcp+0.1).toFixed(1));
  state.user.hdcp=state.hdcpHistory[state.hdcpHistory.length-1];
  buildCaddieMemory();
  state.currentRound=null;
  state.holeLog={};
  state.aiRecap=null;
  state.aiAdvice={};
  saveState();
  go('post-round');
  if(window.AI?.hasKey()) setTimeout(()=>getAIRecap(),800);
}

// ── POST ROUND SUMMARY ───────────────────────────────────────────────
function renderPostRound(){
  const round=state.rounds[state.rounds.length-1];
  if(!round) return renderFeed();
  const s=round.summary;
  const fwPct=s.fwTotal>0?Math.round(s.fairways/s.fwTotal*100):0;
  const girPct=s.girTotal>0?Math.round(s.gir/s.girTotal*100):0;
  const newHdcp=state.hdcpHistory[state.hdcpHistory.length-1];
  const prevHdcp=state.hdcpHistory.length>1?state.hdcpHistory[state.hdcpHistory.length-2]:state.user.hdcp;
  const hdcpDelta=+(newHdcp-prevHdcp).toFixed(1);

  // what the round confirmed/changed
  const insights=[];
  Object.entries(state.holeLog).forEach(([hi,h])=>{
    if(!h.club) return;
    const prev=(state.caddieMem[parseInt(hi)]||[]).slice(0,-1);
    if(prev.length>=2){
      const sameClub=prev.filter(p=>p.club===h.club);
      if(h.result==='good'&&sameClub.length>=1) insights.push(`✅ ${h.club} on hole ${parseInt(hi)+1} — pattern confirmed`);
      if(h.result==='disaster'&&sameClub.filter(p=>p.result==='disaster').length>=1) insights.push(`⚠️ ${h.club} on hole ${parseInt(hi)+1} — trouble again`);
    }
  });
  if(insights.length===0) insights.push(`📊 ${Object.keys(state.holeLog).length} holes logged — caddie memory is building`);

  return `<div class="scr on">
    ${sb()}${topbar('Round complete',false,'<span onclick="go(\'feed\')" style="color:'+G.gT+';">Done</span>')}
    <div class="scroll">
      <div style="text-align:center;padding:20px 16px 12px;">
        <div style="font-size:52px;font-weight:500;color:${G.g};">${s.score}</div>
        <div style="font-size:13px;color:${G.m};margin-top:4px;">${round.course} · ${round.date}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 12px;">
        <div style="background:${G.gB};border-radius:10px;padding:10px 12px;"><div style="font-size:22px;font-weight:500;color:${G.g};">${newHdcp.toFixed(1)}</div><div style="font-size:11px;color:${G.gD};margin-top:2px;">New handicap ${hdcpDelta<=0?'(↓'+Math.abs(hdcpDelta)+')':'(↑'+hdcpDelta+')'}</div></div>
        <div style="background:${G.s2};border-radius:10px;padding:10px 12px;"><div style="font-size:22px;font-weight:500;color:${G.t};">${fwPct}%</div><div style="font-size:11px;color:${G.m};margin-top:2px;">Fairways hit</div></div>
        <div style="background:${G.s2};border-radius:10px;padding:10px 12px;"><div style="font-size:22px;font-weight:500;color:${G.t};">${girPct}%</div><div style="font-size:11px;color:${G.m};margin-top:2px;">GIR</div></div>
        <div style="background:${G.s2};border-radius:10px;padding:10px 12px;"><div style="font-size:22px;font-weight:500;color:${G.a};">${s.putts}</div><div style="font-size:11px;color:${G.m};margin-top:2px;">3-putt holes</div></div>
      </div>
      <div class="sh">What this round told you</div>
      ${insights.map(ins=>`<div style="margin:0 16px 6px;border-radius:10px;padding:10px 14px;background:${G.s};"><div style="font-size:13px;color:${G.t};line-height:1.5;">${ins}</div></div>`).join('')}
      <div class="sh">AI Coach recap</div>
      <div style="margin:0 16px 12px;border-radius:12px;padding:14px;background:${state.aiRecap?G.gB:G.s};border:.5px solid ${state.aiRecap?'#639922':G.b};">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${state.aiRecap?'10px':'0'};">
          <div style="font-size:11px;color:${state.aiRecap?G.gD:G.m};">Powered by Claude</div>
          <div onclick="getAIRecap()" style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;background:${state.aiRecapLoading?G.s2:G.gB};color:${state.aiRecapLoading?G.m:G.gT};cursor:pointer;border:.5px solid ${state.aiRecapLoading?G.b:'#639922'};">
            ${state.aiRecapLoading?'Thinking...':state.aiRecap?'Refresh':'Generate →'}
          </div>
        </div>
        ${state.aiRecap
          ?`<div style="font-size:13px;color:${G.gT};line-height:1.8;">${state.aiRecap.split('\n').filter(Boolean).map(l=>`<div style="margin-bottom:4px;">${l}</div>`).join('')}</div>`
          :`<div style="font-size:13px;color:${G.m};">Get a personalized coaching breakdown — what worked, what to fix, and one drill for next round.</div>`
        }
        ${!window.AI?.hasKey()?`<div onclick="go('settings')" style="margin-top:8px;font-size:11px;color:${G.a};cursor:pointer;">⚙ Add Claude API key to unlock →</div>`:''}
      </div>
      <div style="padding:12px 16px 20px;display:flex;gap:8px;">
        <div onclick="go('feed')" class="btn bg" style="flex:1;">Share to feed</div>
        <div onclick="go('round')" class="btn bx" style="flex:1;">Play again</div>

  if(!state.notes[i]) state.notes[i]={tags:[],text:'',reminder:false};

function saveNote(){

  if(!state.notes[i]) state.notes[i]={tags:[],text:'',reminder:false};

  saveState();
  showToast('Note saved');
  go('network');

function sendRoundRequest(i){
  const date=document.getElementById('req-date')?.value||'';
  const msg=document.getElementById('req-msg')?.value||'';
  if(!state.roundRequests) state.roundRequests=[];
  state.roundRequests.unshift({playerIdx:i,date,msg,time:'Just now'});

  showToast(`Round request sent to ${NET_DATA[i].n}`);

// ══ PROFILE ════════════════════════════════════════════════════════════
function renderProfile(){
  const pt=state.profTab;
  const stats=computeStats();
  const hasRounds=state.rounds.length>0;

  // hdcp chart
  const hist=state.hdcpHistory.slice(-11);
  const min=Math.min(...hist)-0.5,max=Math.max(...hist)+0.5;
  const range=max-min;
  const chartBars=hist.map((v,i)=>{
    const pct=range>0?((max-v)/range*100):50;
    const isLast=i===hist.length-1;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
      <div style="flex:1;display:flex;align-items:flex-end;width:100%;">
        <div style="width:100%;background:${isLast?G.g:G.gB};border-radius:3px 3px 0 0;height:${Math.max(8,100-pct)}%;min-height:8px;"></div>
      </div>
      <div style="font-size:8px;color:${G.m};">${v.toFixed(1)}</div>
    </div>`;
  }).join('');

  // friend comparison
  const myHdcp=state.user.hdcp;
  const friendComps=state.friends.slice(0,3).map(f=>{
    const diff=+(myHdcp-f.hdcp).toFixed(1);
    return `<div style="display:flex;align-items:center;padding:9px 16px;border-bottom:.5px solid ${G.b};">${av(f.name,f.avIdx,28)}<div style="flex:1;margin-left:8px;font-size:13px;color:${G.t};">${f.name}</div><span class="pill" style="background:${diff<0?G.gB:G.rB};color:${diff<0?G.gT:G.r};">${diff<0?'You by '+Math.abs(diff):'Down '+Math.abs(diff)}</span></div>`;
  }).join('');

  // derived memory patterns
  const patterns=[];
  Object.entries(state.caddieMem).forEach(([hi,mem])=>{
    if(mem.length<2) return;
    const byClub={};
    mem.forEach(m=>{
      if(!byClub[m.club]) byClub[m.club]={good:0,bad:0};
      if(m.result==='good'||m.result==='okay') byClub[m.club].good++;
      else byClub[m.club].bad++;
    });
    Object.entries(byClub).forEach(([club,d])=>{
      const total=d.good+d.bad;
      if(total<2) return;
      if(d.bad/total>=0.6) patterns.push({msg:`Hole ${parseInt(hi)+1}: ${club} causes trouble (${Math.round(d.bad/total*100)}% bad)`,good:false});
      if(d.good/total>=0.8) patterns.push({msg:`Hole ${parseInt(hi)+1}: ${club} is your play (${Math.round(d.good/total*100)}% success)`,good:true});
    });
  });
  const showPatterns=patterns.length>0?patterns:[{msg:'Log rounds to build your caddie memory patterns',good:true}];

  const progRows=[
    {l:"Handicap",v:myHdcp.toFixed(1),pos:true,fromRounds:false},
    {l:"Fairway accuracy",v:hasRounds&&stats.fairways!==null?(stats.fairways+'%'):'--',pos:true,fromRounds:true},
    {l:"3-putt rate",v:hasRounds&&stats.avgPutts!==null?stats.avgPutts+'/rnd':'--',pos:false,fromRounds:true},
    {l:"GIR",v:hasRounds&&stats.gir!==null?(stats.gir+'%'):'--',pos:true,fromRounds:true},
    {l:"Avg score",v:hasRounds&&stats.avgScore?stats.avgScore:'--',pos:false,fromRounds:true},
  ];

  let tabBody='';
  if(pt===0) tabBody=`
    <div class="sh">Patterns learned from your rounds</div>
    ${showPatterns.slice(0,6).map(p=>`<div style="margin:0 16px 6px;border-radius:10px;padding:10px 14px;background:${p.good?G.s:G.aB};"><div style="font-size:13px;color:${p.good?G.t:G.aT};line-height:1.5;">${p.msg}</div></div>`).join('')}
    ${!hasRounds?`<div style="margin:0 16px;padding:12px 14px;border-radius:10px;background:${G.s2};font-size:12px;color:${G.m};">Log rounds on the Round tab — patterns build automatically from what you hit on each hole.</div>`:''}`;
  else if(pt===1) tabBody=`
    <div class="sh">Handicap trend</div>
    <div style="margin:0 16px 12px;border-radius:10px;padding:14px;background:${G.s};">
      <div style="display:flex;align-items:flex-end;height:80px;gap:3px;">${chartBars}</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;"><span style="font-size:10px;color:${G.m};">10 rounds ago</span><span style="font-size:10px;color:${G.m};">Now: ${myHdcp.toFixed(1)}</span></div>
    </div>
    <div class="sh">This month vs last month</div>
    ${progRows.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:.5px solid ${G.b};"><span style="font-size:13px;color:${G.t};">${r.l}</span>${r.fromRounds&&!hasRounds?`<span style="font-size:11px;color:${G.m};">Log rounds to track</span>`:`<span class="pill" style="background:${G.gB};color:${G.gT};">${r.v}</span>`}</div>`).join('')}`;
  else tabBody=`
    <div class="sh">vs your friends</div>
    ${friendComps}
    <div class="sh">Played with recently</div>
    ${NET_DATA.slice(0,3).map((p,i)=>`<div onclick="openNote(${i})" style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:.5px solid ${G.b};cursor:pointer;">${av(p.n,p.a,34)}<div style="flex:1;"><div style="font-size:13px;font-weight:500;color:${G.t};">${p.n}</div><div style="font-size:11px;color:${G.m};margin-top:1px;">${state.notes[i]?.text?state.notes[i].text.slice(0,40)+'...':p.l}</div></div><span style="color:${G.m};">›</span></div>`).join('')}`;

  return `<div class="scr on">
    ${sb()}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 16px 8px;">
      <div style="font-size:20px;font-weight:500;color:${G.t};">Profile</div>
      <div onclick="go('settings')" style="width:32px;height:32px;border-radius:50%;background:${window.AI?.hasKey()?G.gB:G.s2};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;border:.5px solid ${window.AI?.hasKey()?'#639922':G.b};" title="AI Settings">${window.AI?.hasKey()?'✨':'⚙'}</div>
    </div>
    <div class="scroll">
      <div style="padding:12px 16px 16px;text-align:center;border-bottom:.5px solid ${G.b};">
        ${av(state.user.name,0,64)}
        <div style="font-size:18px;font-weight:500;color:${G.t};margin-top:10px;">${state.user.name}</div>
        <div style="font-size:13px;color:${G.m};margin-top:2px;">VP of Sales · Chicago, IL</div>
        <div style="display:flex;justify-content:center;gap:6px;margin-top:10px;"><span class="pill" style="background:${G.gB};color:${G.gT};">Hdcp ${state.user.hdcp.toFixed(1)}</span><span class="pill" style="background:${G.s2};color:${G.m};">${state.rounds.length} rounds logged</span></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px;">
        ${[{n:state.hdcpHistory.length>2?(+(state.hdcpHistory[state.hdcpHistory.length-1]-state.hdcpHistory[0]).toFixed(1)):0,l:"Hdcp change"},{n:"#2",l:"Oct challenge"},{n:state.rounds.length,l:"Rounds logged"}].map(s=>`<div style="background:${G.s};border-radius:10px;padding:10px;text-align:center;"><div style="font-size:20px;font-weight:500;color:${G.g};">${s.n}</div><div style="font-size:10px;color:${G.m};margin-top:2px;">${s.l}</div></div>`).join('')}
      </div>
      <div class="tabs">${['Memory','Progress','Network'].map((t,i)=>`<div class="tab${pt===i?' on':''}" onclick="state.profTab=${i};render();">${t}</div>`).join('')}</div>
      ${tabBody}
      <div style="height:16px;"></div>
    </div>
    ${navHtml('profile')}
  </div>`;
}

function calcLB(){
  return state.players.filter(p=>Object.values(p.picks).filter(Boolean).length===4)
    .map(p=>({...p,total:Object.values(p.picks).filter(Boolean).reduce((s,pk)=>{const live=state.players.find(r=>r.id===pk.id);return s+(live?.score??0);},0)}))
    .sort((a,b)=>{if(a.total!==b.total) return a.total-b.total;// tiebreaker: fewest strokes combined from A-tier pick
      const aA=state.players.find(r=>r.id===a.picks.A?.id)?.score??0;
      const bA=state.players.find(r=>r.id===b.picks.A?.id)?.score??0;
      return aA-bA;});
}

// ── AI HELPERS ───────────────────────────────────────────────────────
function getMatchScore(p, userHdcp){
  const hdcpDiff=Math.abs(parseFloat(p.h)-userHdcp);
  const hdcpScore=Math.max(0,30-hdcpDiff*3);
  const mutualScore=Math.min(25,p.mu*12);
  const roundsScore=Math.min(20,Math.round(p.rd/2));
  const availScore=p.av==='Flexible'?25:p.av==='Sat AM'?20:15;
  return Math.min(99,Math.round(hdcpScore+mutualScore+roundsScore+availScore));
}

    state.aiChallenge={

      metric:parse('Metric'),
      duration:parse('Duration'),
      stake:parse('Stake'),
      why:parse('Why'),
      raw
    };
    state.aiChallengeLoading=false;
    saveState();render();
  }catch(e){
    state.aiChallengeLoading=false;
    showToast('AI error: '+e.message);render();
  }
}

function applyAIChallenge(){
  const ac=state.aiChallenge;
  if(!ac) return;
  // Try to match metric to a known METRICS option
  const metricText=(ac.metric||'').toLowerCase();
  const matched=METRICS.find(m=>metricText.includes(m.l.toLowerCase().split(' ').slice(-1)[0])||metricText.includes(m.id));
  if(matched){
    state.ncMetric=matched.id;
  } else if(metricText){
    state.ncMetric='custom';
    state.ncCustomMetric=ac.metric;
  }
  // Try to match duration to a preset
  const durText=(ac.duration||'').toLowerCase();
  const presets=['1 week','2 weeks','30 days','60 days'];
  const matchedDur=presets.find(p=>durText.includes(p));
  if(matchedDur){
    state.ncDurType='preset';
    state.ncDur=matchedDur;
  } else if(durText.includes('single')||durText.includes('one round')){
    state.ncDurType='single';
  } else if(durText){
    state.ncDurType='custom';
    state.ncCustomDur=ac.duration;
  }
  // Try to match stake
  const stakeText=ac.stake||'';
  const stakes=["Loser buys the round","Bragging rights","Loser picks tee time","Loser carries the bag"];
  const matchedStake=stakes.find(s=>stakeText.toLowerCase().includes(s.toLowerCase().split(' ').slice(0,2).join(' ').toLowerCase()));
  if(matchedStake) state.ncStake=matchedStake;
  showToast('Suggestion applied!');
  render();
}

        <div style="font-size:13px;color:${G.m};">AI features inactive — add a key to enable</div>

      <div class="btn bg" onclick="saveAIKey()">Save & activate</div>
      ${hasKey?`<div onclick="clearAIKey()" style="text-align:center;font-size:12px;color:${G.r};cursor:pointer;padding:8px;">Remove API key</div>`:''}

function saveAIKey(){
  const key=document.getElementById('ai-key-inp')?.value.trim();
  if(!key){showToast('Enter an API key');return;}
  if(window.AI) window.AI.setKey(key);
  else localStorage.setItem('patton_claude_key',key);
  showToast('API key saved — AI features active ✓');
  back();
}
function clearAIKey(){
  if(window.AI) window.AI.setKey('');
  else localStorage.removeItem('patton_claude_key');
  showToast('API key removed');
  render();
}

async function askAICaddie(holeIdx){
  if(!window.AI?.hasKey()){go('settings');return;}
  state.aiLoading=true;
  render();
  try{
    const advice=await AI.getCaddieAdvice(holeIdx,HOLES_DEF[holeIdx],state.user.hdcp,state.caddieMem,computeStats());
    if(!state.aiAdvice) state.aiAdvice={};
    state.aiAdvice[holeIdx]=advice;
    state.aiLoading=false;
    saveState();render();
  }catch(e){
    state.aiLoading=false;
    showToast('AI error: '+e.message);
    render();
  }
}

async function getAIRecap(){
  if(!window.AI?.hasKey()){go('settings');return;}
  state.aiRecapLoading=true;
  render();
  try{
    const round=state.rounds[state.rounds.length-1];
    const recap=await AI.getPostRoundRecap(round,state.caddieMem,state.user.hdcp);
    state.aiRecap=recap;
    state.aiRecapLoading=false;
    saveState();render();
  }catch(e){
    state.aiRecapLoading=false;
    showToast('AI error: '+e.message);
    render();
  }
}
